apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "navigator.fullname" . }}
  labels:
    {{- include "navigator.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "navigator.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "navigator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "navigator.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.podLifecycle.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "navigator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --port
            - {{ .Values.service.port | quote }}
            - --log-level
            - {{ .Values.server.logLevel }}
            - --db-url
            - {{ .Values.server.dbUrl | quote }}
          env:
            - name: NEMOCLAW_SANDBOX_NAMESPACE
              value: {{ .Values.server.sandboxNamespace | quote }}
            - name: NEMOCLAW_SANDBOX_IMAGE
              value: {{ .Values.server.sandboxImage | quote }}
            - name: NEMOCLAW_GRPC_ENDPOINT
              value: {{ .Values.server.grpcEndpoint | quote }}
            {{- if .Values.server.sshGatewayHost }}
            - name: NEMOCLAW_SSH_GATEWAY_HOST
              value: {{ .Values.server.sshGatewayHost | quote }}
            {{- end }}
            {{- if .Values.server.sshGatewayPort }}
            - name: NEMOCLAW_SSH_GATEWAY_PORT
              value: {{ .Values.server.sshGatewayPort | quote }}
            {{- end }}
            - name: NEMOCLAW_TLS_CERT
              value: /etc/navigator-tls/server/tls.crt
            - name: NEMOCLAW_TLS_KEY
              value: /etc/navigator-tls/server/tls.key
            - name: NEMOCLAW_TLS_CLIENT_CA
              value: /etc/navigator-tls/client-ca/ca.crt
            - name: NEMOCLAW_CLIENT_TLS_SECRET_NAME
              value: {{ .Values.server.tls.clientTlsSecretName | quote }}
          volumeMounts:
            - name: navigator-data
              mountPath: /var/navigator
            - name: tls-cert
              mountPath: /etc/navigator-tls/server
              readOnly: true
            - name: tls-client-ca
              mountPath: /etc/navigator-tls/client-ca
              readOnly: true
          ports:
            - name: grpc
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tls-cert
          secret:
            secretName: {{ .Values.server.tls.certSecretName }}
        - name: tls-client-ca
          secret:
            secretName: {{ .Values.server.tls.clientCaSecretName }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: navigator-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
